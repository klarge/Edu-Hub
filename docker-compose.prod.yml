# Standalone production compose file — uses pre-built images only.
# Deploy this file directly in Portainer, Swarm, or any host that only has the YAML.
# No source code needs to be present on the server.
#
# Required environment variables (set in Portainer's "Env" tab or a .env file):
#   SESSION_SECRET    — long random string, e.g. $(openssl rand -hex 32)
#
# Optional:
#   IMAGE_TAG         — image tag to pull (default: latest)
#   POSTGRES_PASSWORD — change for production (default: eduhub_secret)
#   HTTP_PORT         — host port for the web UI (default: 80)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-eduhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduhub_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-eduhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eduhub} -d ${POSTGRES_DB:-eduhub}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/klarge/edu-hub/api-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT:           8080
      NODE_ENV:       production
      DATABASE_URL:   postgresql://${POSTGRES_USER:-eduhub}:${POSTGRES_PASSWORD:-eduhub_secret}@postgres:5432/${POSTGRES_DB:-eduhub}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      UPLOAD_DIR:     /data/uploads
      REDIS_URL:      ${REDIS_URL:-}
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    image: ghcr.io/klarge/edu-hub/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
