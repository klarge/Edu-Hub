            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createQuiz
      tags: [trainings]
      summary: Create a quiz for a training (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      requestBody:
        required: true
