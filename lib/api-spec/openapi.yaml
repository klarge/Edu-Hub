openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Training Platform API
servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: groups
    description: Tag group management
  - name: settings
    description: Application settings
  - name: trainings
    description: Online training management
  - name: events
    description: In-person event management
  - name: completions
    description: Completion records

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ───────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Local username/password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and clear auth cookie
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/saml/login:
    get:
      operationId: samlLogin
      tags: [auth]
      summary: Initiate SAML SSO login (redirects to IdP)
      responses:
        "302":
          description: Redirect to IdP
        "404":
          description: SAML not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/saml/callback:
    post:
      operationId: samlCallback
      tags: [auth]
      summary: SAML SSO callback (IdP posts here)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                SAMLResponse:
                  type: string
      responses:
        "302":
          description: Redirect to frontend after successful auth
        "400":
          description: Invalid SAML response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/saml/metadata:
    get:
      operationId: samlMetadata
      tags: [auth]
      summary: SAML SP metadata XML
      responses:
        "200":
          description: SP metadata XML
          content:
            application/xml:
              schema:
                type: string

  /auth/oauth/{provider}/login:
    get:
      operationId: oauthLogin
      tags: [auth]
      summary: Initiate OAuth login (redirects to provider)
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
      responses:
        "302":
          description: Redirect to OAuth provider
        "404":
          description: Provider not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/oauth/{provider}/callback:
    get:
      operationId: oauthCallback
      tags: [auth]
      summary: OAuth callback handler
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend after successful auth
        "400":
          description: OAuth error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Users ──────────────────────────────────────────────────────────────────

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (paginated, searchable)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: role
          schema:
            $ref: "#/components/schemas/UserRole"
        - in: query
          name: groupId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/import:
    post:
      operationId: importUsers
      tags: [users]
      summary: Bulk import users via CSV file or JSON array (admin only)
      security:
        - cookieAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    $ref: "#/components/schemas/ImportUserRecord"
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate user (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/api-keys:
    get:
      operationId: listApiKeys
      tags: [users]
      summary: List API keys for a user
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: List of API keys (without secrets)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListResponse"

    post:
      operationId: createApiKey
      tags: [users]
      summary: Create an API key for a user
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: API key created (rawKey shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreateResponse"

  /users/{id}/api-keys/{keyId}:
    delete:
      operationId: revokeApiKey
      tags: [users]
      summary: Revoke an API key
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
        - in: path
          name: keyId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Groups ─────────────────────────────────────────────────────────────────

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List all tag groups
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupListResponse"

    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a tag group (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"

  /groups/{id}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get a tag group by ID
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateGroup
      tags: [groups]
      summary: Update a tag group (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupRequest"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"

    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a tag group (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /groups/{id}/members:
    get:
      operationId: listGroupMembers
      tags: [groups]
      summary: List members of a tag group
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: List of group members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMemberListResponse"

    post:
      operationId: addGroupMember
      tags: [groups]
      summary: Add a user to a tag group (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /groups/{id}/members/{userId}:
    delete:
      operationId: removeGroupMember
      tags: [groups]
      summary: Remove a user from a tag group (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/groups:
    get:
      operationId: getUserGroups
      tags: [users]
      summary: Get groups a user belongs to (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User group memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroupMembershipsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/team/completion-status:
    get:
      operationId: getTeamCompletionStatus
      tags: [users]
      summary: Get completion status for manager's team members (manager only)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: trainingId
          required: false
          schema:
            type: string
          description: Filter completion data to a specific training
        - in: query
          name: fromDate
          required: false
          schema:
            type: string
            format: date
          description: Filter completions from this date (ISO date string)
        - in: query
          name: toDate
          required: false
          schema:
            type: string
            format: date
          description: Filter completions up to this date (ISO date string)
      responses:
        "200":
          description: Team users with completion summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamCompletionResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Role Groups ─────────────────────────────────────────────────────────────

  /groups/roles:
    get:
      operationId: listRoleGroups
      tags: [groups]
      summary: List the four fixed role groups (manager+)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of role groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleGroupListResponse"

  /groups/roles/{role}:
    get:
      operationId: getRoleGroup
      tags: [groups]
      summary: Get a role group with its current members
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: role
          required: true
          schema:
            $ref: "#/components/schemas/UserRole"
      responses:
        "200":
          description: Role group with members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleGroupDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Settings ────────────────────────────────────────────────────────────────

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all application settings (admin only)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Application settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"

    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /settings/public:
    get:
      operationId: getPublicSettings
      tags: [settings]
      summary: Get publicly readable settings (app name, enabled auth providers)
      responses:
        "200":
          description: Public settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"

  /settings/auth-providers:
    get:
      operationId: listAuthProviders
      tags: [settings]
      summary: List authentication provider configurations (admin only)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Auth provider configs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProviderListResponse"

  /settings/auth-providers/{provider}:
    get:
      operationId: getAuthProvider
      tags: [settings]
      summary: Get an auth provider config (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/AuthProvider"
      responses:
        "200":
          description: Auth provider config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProviderResponse"

    put:
      operationId: updateAuthProvider
      tags: [settings]
      summary: Update auth provider config (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/AuthProvider"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAuthProviderRequest"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProviderResponse"

  /settings/audit-log:
    get:
      operationId: getAuditLog
      tags: [settings]
      summary: Get audit log entries (admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"

  # ─── Trainings ───────────────────────────────────────────────────────────────

  /trainings:
    get:
      operationId: listTrainings
      tags: [trainings]
      summary: List trainings visible to the current user
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of trainings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTrainings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createTraining
      tags: [trainings]
      summary: Create a new training (training_lead+)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainingRequest"
      responses:
        "201":
          description: Training created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainings/{id}:
    get:
      operationId: getTraining
      tags: [trainings]
      summary: Get a training with its content items
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      responses:
        "200":
          description: Training detail with content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateTraining
      tags: [trainings]
      summary: Update a training (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainingRequest"
      responses:
        "200":
          description: Updated training
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteTraining
      tags: [trainings]
      summary: Soft-delete a training (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      responses:
        "200":
          description: Training deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainings/{id}/content:
    post:
      operationId: addTrainingContent
      tags: [trainings]
      summary: Add a YouTube or Slides URL content item (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTrainingContentRequest"
      responses:
        "201":
          description: Content item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingContentResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainings/{id}/content/scorm:
    post:
      operationId: uploadScorm
      tags: [trainings]
      summary: Upload a SCORM package ZIP file (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: SCORM content uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingContentResponse"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainings/{id}/content/pptx:
    post:
      operationId: uploadPptx
      tags: [trainings]
      summary: Upload a PowerPoint (.pptx) file (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: PPTX content uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingContentResponse"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainings/{id}/content/{contentId}:
    delete:
      operationId: deleteTrainingContent
      tags: [trainings]
      summary: Delete a training content item (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
        - in: path
          name: contentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Content deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /trainings/{id}/scorm-complete:
    post:
      operationId: scormComplete
      tags: [trainings]
      summary: Record SCORM completion event
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                score:
                  type: integer
                contentId:
                  type: string
                  description: Specific SCORM content item UUID to mark as viewed (marks all SCORM items if omitted)
      responses:
        "200":
          description: Completion recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScormCompleteResponse"

  /trainings/{id}/assignments:
    get:
      operationId: listTrainingAssignments
      tags: [trainings]
      summary: List group assignments for a training (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TrainingId"
      responses:
        "200":
          description: List of group assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingAssignmentListResponse"

    post:
