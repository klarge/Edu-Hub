          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRegistrationResponse"
        "409":
          description: Already registered or full capacity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}/assign:
    post:
      operationId: assignUserToEvent
      tags: [events]
      summary: Assign a user to an event (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
      responses:
        "201":
          description: User assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRegistrationResponse"
        "409":
          description: Already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}/registrations/{userId}:
    delete:
      operationId: unregisterFromEvent
      tags: [events]
      summary: Unregister a user from an event
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unregistered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /events/{id}/attendance-code:
