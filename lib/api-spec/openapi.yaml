      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                expiresInMinutes:
                  type: integer
                  default: 60
      responses:
        "200":
          description: Attendance code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceCodeResponse"

  /events/{id}/attend:
    post:
      operationId: submitAttendanceCode
      tags: [events]
      summary: Submit an attendance code to mark self as attended
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Attendance recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}/attendance/{userId}/mark:
    post:
      operationId: manualMarkAttendance
      tags: [events]
      summary: Manually mark a user as attended/not attended (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attended:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Attendance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /events/{id}/attendance/bulk-mark:
    post:
      operationId: bulkMarkAttendance
      tags: [events]
      summary: Mark all registered users as attended (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Bulk attendance marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkMarkAttendanceResponse"

  /events/{id}/assignments:
    get:
      operationId: listEventAssignments
      tags: [events]
      summary: List group assignments for an event (training_lead+)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: List of group assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventAssignmentListResponse"

    post:
      operationId: assignEventToGroup
      tags: [events]
      summary: Assign an event to a group (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignToGroupRequest"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventAssignmentResponse"
        "409":
          description: Already assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/{id}/assignments/{assignmentId}:
    delete:
      operationId: unassignEventFromGroup
      tags: [events]
      summary: Remove an event group assignment (admin only)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/EventId"
        - in: path
          name: assignmentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Assignment removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Completions ─────────────────────────────────────────────────────────────

  /users/{id}/completions:
    get:
      operationId: getUserCompletions
      tags: [completions]
      summary: Get completion history for a user
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Completion records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionListResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /completions:
    get:
      operationId: listAllCompletions
      tags: [completions]
      summary: List all completion records (training_lead+)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: All completion records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionListResponse"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token

  parameters:
    UserId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: User UUID
    GroupId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Group UUID
    AuthProvider:
      in: path
      name: provider
      required: true
      schema:
        $ref: "#/components/schemas/AuthProviderType"
    TrainingId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Training UUID
    EventId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Event UUID

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    UserRole:
      type: string
      enum: [admin, training_lead, manager, user]

    TagGroupType:
      type: string
      enum: [location, job_type]

    AuthProviderType:
      type: string
      enum: [saml, google, microsoft]

    OAuthProvider:
      type: string
      enum: [google, microsoft]

    User:
      type: object
      required: [id, email, firstName, lastName, role, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        isActive:
          type: boolean
        ssoProvider:
          type: string
          nullable: true
        ssoSubject:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserDetail:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            tagGroupIds:
              type: array
              items:
                type: string

    TagGroup:
      type: object
      required: [id, name, type, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/TagGroupType"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GroupMember:
      type: object
      required: [userId, email, firstName, lastName, role, isActive]
      properties:
        userId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        isActive:
          type: boolean

    AuthProviderConfig:
      type: object
      properties:
        id:
          type: string
        provider:
          $ref: "#/components/schemas/AuthProviderType"
        enabled:
          type: boolean
        config:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuditLogEntry:
      type: object
      required: [id, action, createdAt]
      properties:
        id:
          type: string
        action:
          type: string
        resourceType:
          type: string
          nullable: true
        resourceId:
          type: string
          nullable: true
        details:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        userEmail:
          type: string
          nullable: true
        userFirstName:
          type: string
          nullable: true
        userLastName:
          type: string
          nullable: true

    ApiKeyInfo:
      type: object
      required: [id, name, isActive, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        isActive:
          type: boolean
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    ImportUserRecord:
      type: object
      required: [email]
      properties:
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        password:
          type: string

    ImportResultItem:
      type: object
      required: [email, status]
      properties:
        email:
          type: string
        status:
          type: string
          enum: [created, exists, error]
        error:
          type: string
          nullable: true

    # ─── Request bodies ──────────────────────────────────────────────────────

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    CreateUserRequest:
      type: object
      required: [email, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        isActive:
          type: boolean

    CreateGroupRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/TagGroupType"

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/TagGroupType"

    UpdateAuthProviderRequest:
      type: object
      properties:
        enabled:
          type: boolean
        config:
          type: object
          additionalProperties: true

    # ─── Response wrappers ──────────────────────────────────────────────────────

    LoginResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    UserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    UserDetailResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserDetail"

    PaginatedUsers:
      type: object
      required: [users, total, page, limit]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ImportResult:
      type: object
      required: [total, created, existing, errors, results]
      properties:
        total:
          type: integer
        created:
          type: integer
        existing:
          type: integer
        errors:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/ImportResultItem"

    GroupResponse:
      type: object
      required: [group]
      properties:
        group:
          $ref: "#/components/schemas/TagGroup"

    GroupListResponse:
      type: object
      required: [groups]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TagGroup"

    GroupMemberListResponse:
      type: object
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"

    SettingsResponse:
      type: object
      required: [settings]
      properties:
        settings:
          type: object
          additionalProperties:
            type: string

    AuthProviderResponse:
      type: object
      required: [provider]
      properties:
        provider:
          $ref: "#/components/schemas/AuthProviderConfig"

    AuthProviderListResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/AuthProviderConfig"

    AuditLogResponse:
      type: object
      required: [logs, page, limit]
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        page:
          type: integer
        limit:
          type: integer

    ApiKeyListResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyInfo"

    ApiKeyCreateResponse:
      type: object
      required: [key]
      properties:
        key:
          allOf:
            - $ref: "#/components/schemas/ApiKeyInfo"
            - type: object
              properties:
                rawKey:
                  type: string

    RoleGroup:
      type: object
      required: [id, name, role, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    RoleGroupListResponse:
      type: object
      required: [roleGroups]
      properties:
        roleGroups:
          type: array
          items:
            $ref: "#/components/schemas/RoleGroup"

    RoleGroupMember:
      type: object
      required: [id, email, firstName, lastName, isActive]
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        isActive:
          type: boolean

    RoleGroupDetailResponse:
      type: object
      required: [roleGroup, members]
      properties:
        roleGroup:
          $ref: "#/components/schemas/RoleGroup"
        members:
          type: array
          items:
            $ref: "#/components/schemas/RoleGroupMember"

    UserGroupMembership:
      type: object
      required: [groupId, groupName]
      properties:
        groupId:
          type: string
        groupName:
          type: string

    UserGroupMembershipsResponse:
      type: object
      required: [groups]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/UserGroupMembership"

    TeamCompletionSummary:
      type: object
      required: [completed, pending, overdue, total]
      properties:
        completed:
          type: integer
        pending:
          type: integer
        overdue:
          type: integer
        total:
          type: integer

    TeamCompletionUser:
      type: object
      required: [id, email, firstName, lastName, role]
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        completionSummary:
          $ref: "#/components/schemas/TeamCompletionSummary"
          nullable: true

    TeamCompletionResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/TeamCompletionUser"

    # ─── Training schemas ─────────────────────────────────────────────────────

    TrainingContentType:
      type: string
      enum: [scorm, youtube, slides, pptx]

    Training:
      type: object
      required: [id, title, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        estimatedDurationMinutes:
          type: integer
          nullable: true
        isActive:
          type: boolean
        createdBy:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
          description: Earliest due date from the current user's group assignments (null if no due date set)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TrainingContent:
      type: object
      required: [id, trainingId, type, createdAt]
      properties:
        id:
          type: string
        trainingId:
          type: string
        type:
          $ref: "#/components/schemas/TrainingContentType"
        title:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        filePath:
          type: string
          nullable: true
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    TrainingGroupAssignment:
      type: object
      required: [id, trainingId, groupId, assignedAt]
      properties:
        id:
          type: string
        trainingId:
          type: string
        groupId:
          type: string
        dueDate:
          type: string
          format: date-time
          nullable: true
        assignedBy:
          type: string
          nullable: true
        assignedAt:
          type: string
          format: date-time

    Quiz:
      type: object
      required: [id, trainingId, title, passingScore, createdAt, updatedAt]
      properties:
        id:
          type: string
        trainingId:
          type: string
        title:
          type: string
        passingScore:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    QuizQuestion:
      type: object
      required: [id, quizId, question, options, displayOrder]
      properties:
        id:
          type: string
        quizId:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswerIndex:
          type: integer
          description: Only returned for training leads and admins
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    QuizAttempt:
      type: object
      required: [id, userId, quizId, answers, score, passed, completedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        quizId:
          type: string
        answers:
          type: array
          items:
            type: integer
        score:
          type: integer
        passed:
          type: boolean
        completedAt:
          type: string
          format: date-time

    # ─── Event schemas ────────────────────────────────────────────────────────

    Event:
      type: object
      required: [id, title, startAt, endAt, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        estimatedDurationMinutes:
          type: integer
          nullable: true
        maxCapacity:
          type: integer
          nullable: true
        attendanceCode:
          type: string
          nullable: true
          description: Only visible to training leads and admins
        attendanceCodeExpiresAt:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EventRegistration:
      type: object
      required: [id, eventId, userId, registeredAt]
      properties:
        id:
          type: string
        eventId:
          type: string
        userId:
          type: string
        assignedBy:
          type: string
          nullable: true
        registeredAt:
          type: string
          format: date-time

    EventGroupAssignment:
      type: object
      required: [id, eventId, groupId, assignedAt]
      properties:
        id:
          type: string
        eventId:
          type: string
        groupId:
          type: string
        assignedBy:
          type: string
          nullable: true
        assignedAt:
          type: string
          format: date-time

    # ─── Completion schemas ───────────────────────────────────────────────────

    CompletionRecord:
      type: object
      required: [id, userId, completedAt, createdAt, dueDate, isOverdue]
      properties:
        id:
          type: string
        userId:
          type: string
        trainingId:
          type: string
          nullable: true
        eventId:
          type: string
          nullable: true
        durationMinutes:
          type: integer
          nullable: true
        score:
          type: integer
          nullable: true
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        trainingTitle:
          type: string
          nullable: true
        eventTitle:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
          description: Earliest due date for this training across the user's assigned groups; null for event completions or trainings with no due date
        isOverdue:
          type: boolean
          description: True if the training was completed after the due date

    # ─── Request bodies ───────────────────────────────────────────────────────

    CreateTrainingRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        estimatedDurationMinutes:
          type: integer

    UpdateTrainingRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        estimatedDurationMinutes:
          type: integer
        isActive:
          type: boolean

    AddTrainingContentRequest:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          enum: [youtube, slides]
        title:
          type: string
        url:
          type: string
        displayOrder:
          type: integer

    AssignToGroupRequest:
      type: object
      required: [groupId]
      properties:
        groupId:
          type: string
        dueDate:
          type: string
          format: date-time

    CreateQuizRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        passingScore:
          type: integer
          default: 70

    UpdateQuizRequest:
      type: object
      properties:
        title:
          type: string
        passingScore:
          type: integer

    CreateQuizQuestionRequest:
      type: object
      required: [question, options, correctAnswerIndex]
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
          minItems: 2
        correctAnswerIndex:
          type: integer
        displayOrder:
          type: integer

    UpdateQuizQuestionRequest:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswerIndex:
          type: integer
        displayOrder:
          type: integer

    QuizSubmitRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            type: integer

    CreateEventRequest:
      type: object
      required: [title, startAt, endAt]
      properties:
        title:
          type: string
        description:
          type: string
        location:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        estimatedDurationMinutes:
          type: integer
        maxCapacity:
          type: integer

    UpdateEventRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        location:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        estimatedDurationMinutes:
          type: integer
        maxCapacity:
          type: integer
        isActive:
          type: boolean

    # ─── Response wrappers ────────────────────────────────────────────────────

    TrainingResponse:
      type: object
      required: [training]
      properties:
        training:
          $ref: "#/components/schemas/Training"

    TrainingDetailResponse:
      type: object
      required: [training, content]
      properties:
        training:
          $ref: "#/components/schemas/Training"
        content:
          type: array
          items:
            $ref: "#/components/schemas/TrainingContent"

    TrainingContentResponse:
      type: object
      required: [content]
      properties:
        content:
          $ref: "#/components/schemas/TrainingContent"

    PaginatedTrainings:
      type: object
      required: [trainings, total, page, limit]
      properties:
        trainings:
          type: array
          items:
            $ref: "#/components/schemas/Training"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    TrainingAssignmentResponse:
      type: object
      required: [assignment]
      properties:
        assignment:
          $ref: "#/components/schemas/TrainingGroupAssignment"

    TrainingAssignmentListResponse:
      type: object
      required: [assignments]
      properties:
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/TrainingGroupAssignment"

    QuizResponse:
      type: object
      required: [quiz]
      properties:
        quiz:
          $ref: "#/components/schemas/Quiz"

    QuizDetailResponse:
      type: object
      required: [quiz, questions]
      properties:
        quiz:
          $ref: "#/components/schemas/Quiz"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"

    QuizQuestionResponse:
      type: object
      required: [question]
      properties:
        question:
          $ref: "#/components/schemas/QuizQuestion"

    QuizSubmitResponse:
      type: object
      required: [attempt, score, passed, passingScore, trainingCompleted]
      properties:
        attempt:
          $ref: "#/components/schemas/QuizAttempt"
        score:
          type: integer
        passed:
          type: boolean
        passingScore:
          type: integer
        trainingCompleted:
          type: boolean
          description: True if the training is now fully completed (quiz passed + all content viewed)

    QuizAttemptListResponse:
      type: object
      required: [attempts]
      properties:
        attempts:
          type: array
          items:
            $ref: "#/components/schemas/QuizAttempt"

    EventResponse:
      type: object
      required: [event]
      properties:
        event:
          $ref: "#/components/schemas/Event"

    EventDetailResponse:
      type: object
      required: [event, registrations, attendance]
      properties:
        event:
          $ref: "#/components/schemas/Event"
        registrations:
          type: array
          items:
            $ref: "#/components/schemas/EventRegistration"
        attendance:
          type: array
          items:
            type: object
            additionalProperties: true

    PaginatedEvents:
      type: object
      required: [events, total, page, limit]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    EventRegistrationResponse:
      type: object
      required: [registration]
      properties:
        registration:
          $ref: "#/components/schemas/EventRegistration"

    AttendanceCodeResponse:
      type: object
      required: [code, expiresAt]
      properties:
        code:
          type: string
        expiresAt:
          type: string
          format: date-time

    BulkMarkAttendanceResponse:
      type: object
      required: [success, marked]
      properties:
        success:
          type: boolean
        marked:
          type: integer

    EventAssignmentResponse:
      type: object
      required: [assignment]
      properties:
        assignment:
          $ref: "#/components/schemas/EventGroupAssignment"

    EventAssignmentListResponse:
      type: object
      required: [assignments]
      properties:
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/EventGroupAssignment"

    CompletionListResponse:
      type: object
      required: [completions]
      properties:
        completions:
          type: array
          items:
            $ref: "#/components/schemas/CompletionRecord"

    ScormCompleteResponse:
      type: object
      required: [success, trainingCompleted]
      properties:
        success:
          type: boolean
        trainingCompleted:
          type: boolean
          description: True if all completion criteria (content viewed + quiz passed) are now met
